<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI SAT Tutor</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="panel">
      <header class="header" aria-labelledby="panel-title">
        <p class="eyebrow">Week 1</p>
        <h1 id="panel-title">AI SAT Tutor</h1>
        <p class="status" id="status">Ready.</p>
      </header>

      <section class="messages" id="messages" aria-live="polite" aria-label="Tutor chat">
        <article class="message assistant">
          <span class="label">Tutor</span>
          <p>Ready when you are.</p>
        </article>
      </section>

      <form class="composer" id="tutor-form">
        <label for="student-thinking">Your thinking</label>
        <textarea
          id="student-thinking"
          name="studentThinking"
          rows="5"
          placeholder="I divided 27 by 3 and got 9..."
        ></textarea>
        <button type="submit" id="explain-button">Explain my mistake</button>
      </form>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
