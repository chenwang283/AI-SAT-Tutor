<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI SAT Tutor</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="panel">
      <header class="header" aria-labelledby="panel-title">
        <div class="header-main">
          <div>
            <p class="eyebrow">Week 2</p>
            <h1 id="panel-title">AI SAT Tutor</h1>
          </div>
          <button type="button" class="secondary-button" id="reset-button">New question</button>
        </div>
        <p class="status" id="status">Ready.</p>
      </header>

      <section class="messages" id="messages" aria-live="polite" aria-label="Tutor chat"></section>

      <form class="composer" id="tutor-form">
        <label for="student-message">Message</label>
        <textarea
          id="student-message"
          name="studentMessage"
          rows="5"
          placeholder="Explain what you tried, or ask a follow-up question..."
        ></textarea>
        <button type="submit" id="explain-button">Explain my mistake</button>
      </form>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
