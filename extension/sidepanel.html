<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI SAT Tutor</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="panel">
      <section class="header" aria-labelledby="panel-title">
        <p class="eyebrow">Sprint 0</p>
        <h1 id="panel-title">AI SAT Tutor</h1>
        <p class="status" id="load-status">Side panel loaded.</p>
      </section>

      <section class="placeholder" aria-label="Next sprint preview">
        <div class="message assistant">
          <span class="label">Tutor</span>
          <p>The extension shell is ready. In Week 1, this panel will read the current StudySpaces question and send it to the server.</p>
        </div>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
